<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏素材智能小工具</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="./src/styles/main.css?v=20260604-full-user-prompt" />
</head>
<body>
  <div class="app">
    <!-- 左侧栏 -->
    <aside class="sidebar">
      <a class="sidebar__brand" href="./index.html" aria-label="返回首页">
        <div class="sidebar__logo">
          <img src="./assets/image/qb_logo.png" alt="QB Logo" />
        </div>
        <div class="sidebar__name">游戏素材智能小工具</div>
      </a>

      <div class="sidebar__scroll">
        <!-- 素材目录（唯一侧边栏内容） -->
        <div class="sidebar__group">
          <div class="sidebar__group-title">素材目录</div>
          <div class="sidebar__tree" id="sidebarTree"></div>
        </div>
      </div>

      <div class="sidebar__footer">
        <button class="gallery-entry" id="galleryOpenBtn" type="button" aria-label="打开我的图库">
          <span class="gallery-entry__icon">
            <img src="./assets/image/my_image.svg" alt="" aria-hidden="true" />
          </span>
          <span>我的图库</span>
          <span class="gallery-entry__count" id="galleryCount">0</span>
        </button>
      </div>
    </aside>

    <!-- 主工作区 -->
    <main class="workspace">
      <section class="panel is-active">
        <header class="panel__head">
          <h1 class="panel__title" id="specSelectText">未选择规范</h1>
        </header>

        <!-- 整个内容区自由滚动 -->
        <div class="panel__body panel__body--flow">
          <!-- 上：工作区 -->
          <div class="workarea" id="checkerBody"></div>

          <!-- 简易分割线 -->
          <div class="section-divider">
            <span>规范说明</span>
          </div>

          <!-- 下：规范区 -->
          <div class="spec-pane" id="specPane"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- 文件选择 -->
  <input class="file-input-hidden" type="file" id="fileInput" multiple accept="image/*,video/*" />

  <!-- 修复弹窗 -->
  <div class="modal" id="fixModal" hidden>
    <div class="modal__mask" data-close></div>
    <div class="modal__dialog">
      <div class="modal__header">
        <h3 class="modal__title">选择修复方式</h3>
        <button class="modal__close" data-close>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal__body" id="fixModalBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost btn--sm" data-close>取消</button>
        <button class="btn btn--primary btn--sm" id="fixStartBtn">开始修复</button>
      </div>
    </div>
  </div>

  <!-- 预览对比弹窗 -->
  <div class="modal" id="previewModal" hidden>
    <div class="modal__mask" data-close></div>
    <div class="modal__dialog modal__dialog--wide">
      <div class="modal__header">
        <h3 class="modal__title">修复结果预览</h3>
        <button class="modal__close" data-close>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal__body" id="previewModalBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost btn--sm" id="regenerateAiFixBtn" hidden>重新生成</button>
        <button class="btn btn--ghost btn--sm" data-close>放弃</button>
        <button class="btn btn--primary btn--sm" id="downloadFixedBtn">确认并下载</button>
      </div>
    </div>
  </div>


  <!-- 我的图库弹窗 -->
  <div class="modal" id="galleryModal" hidden>
    <div class="modal__mask" data-close></div>
    <div class="modal__dialog modal__dialog--wide modal__dialog--gallery">
      <div class="modal__header">
        <h3 class="modal__title">我的图库</h3>
        <button class="modal__close" data-close>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal__body gallery-modal__body" id="galleryModalBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost btn--sm" id="galleryClearBtn">清空图库</button>
        <button class="btn btn--primary btn--sm" data-close>完成</button>
      </div>
    </div>
  </div>

  <!-- 图片放大预览 -->
  <div class="modal image-lightbox" id="imageLightbox" hidden>
    <div class="modal__mask" data-close></div>
    <button class="image-lightbox__close" data-close aria-label="关闭图片预览">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <img class="image-lightbox__img" id="imageLightboxImg" src="" alt="" />
  </div>

  <script>
    // EdgeOne Pages 前后端分域部署时，填 DevCloud 后端地址，例如：https://your-devcloud-domain
    window.SUCAI_TOOL_API_BASE_URL = window.SUCAI_TOOL_API_BASE_URL || '';
  </script>
  <script type="module" src="./src/main.js?v=20260604-full-user-prompt"></script>
</body>
</html>
