<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏素材处刑台</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body>
  <div class="app">
    <!-- 左侧栏 -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 头骨主体 -->
            <path d="M12 2C7 2 3.5 5.2 3.5 9.5c0 2.2 0.9 4 2.3 5.4 0.5 0.5 0.7 1.1 0.7 1.8V18c0 0.6 0.4 1 1 1h1v2c0 0.6 0.4 1 1 1h1v-2h1v2h2v-2h1v2h1c0.6 0 1-0.4 1-1v-2h1c0.6 0 1-0.4 1-1v-1.3c0-0.7 0.2-1.3 0.7-1.8 1.4-1.4 2.3-3.2 2.3-5.4C20.5 5.2 17 2 12 2z" fill="#fff"/>
            <!-- 左眼 -->
            <ellipse cx="8.5" cy="10.5" rx="1.8" ry="2.2" fill="#0A0A0C"/>
            <!-- 右眼 -->
            <ellipse cx="15.5" cy="10.5" rx="1.8" ry="2.2" fill="#0A0A0C"/>
            <!-- 鼻孔 -->
            <path d="M12 13.5 L11 15.5 L12 16 L13 15.5 Z" fill="#0A0A0C"/>
            <!-- 牙齿分隔线 -->
            <path d="M9 19v2M12 19v2M15 19v2" stroke="#0A0A0C" stroke-width="0.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="sidebar__name">游戏素材处刑台</div>
      </div>

      <div class="sidebar__scroll">
        <!-- 素材目录（唯一侧边栏内容） -->
        <div class="sidebar__group">
          <div class="sidebar__group-title">素材目录</div>
          <div class="sidebar__tree" id="sidebarTree"></div>
        </div>
      </div>
    </aside>

    <!-- 主工作区 -->
    <main class="workspace">
      <section class="panel is-active">
        <header class="panel__head">
          <h1 class="panel__title" id="specSelectText">未选择规范</h1>
        </header>

        <!-- 整个内容区自由滚动 -->
        <div class="panel__body panel__body--flow">
          <!-- 上：工作区 -->
          <div class="workarea" id="checkerBody"></div>

          <!-- 简易分割线 -->
          <div class="section-divider">
            <span>规范说明</span>
          </div>

          <!-- 下：规范区 -->
          <div class="spec-pane" id="specPane"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- 文件选择 -->
  <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden />

  <!-- 修复弹窗 -->
  <div class="modal" id="fixModal" hidden>
    <div class="modal__mask" data-close></div>
    <div class="modal__dialog">
      <div class="modal__header">
        <h3 class="modal__title">选择修复方式</h3>
        <button class="modal__close" data-close>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal__body" id="fixModalBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost btn--sm" data-close>取消</button>
        <button class="btn btn--primary btn--sm" id="fixStartBtn">开始修复</button>
      </div>
    </div>
  </div>

  <!-- 预览对比弹窗 -->
  <div class="modal" id="previewModal" hidden>
    <div class="modal__mask" data-close></div>
    <div class="modal__dialog modal__dialog--wide">
      <div class="modal__header">
        <h3 class="modal__title">修复结果预览</h3>
        <button class="modal__close" data-close>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal__body" id="previewModalBody"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost btn--sm" data-close>放弃</button>
        <button class="btn btn--primary btn--sm" id="downloadFixedBtn">确认并下载</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
